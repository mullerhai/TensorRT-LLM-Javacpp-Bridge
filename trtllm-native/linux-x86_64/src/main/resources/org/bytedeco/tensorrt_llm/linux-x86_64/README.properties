# JavaCPP native library properties for TensorRT-LLM on Linux x86_64
#
# This file tells JavaCPP where to find the native libraries.
# The .so files should be placed in this same directory.
#
# Required native libraries:
#   libjniTRTLLM.so             - JNI bridge (generated by JavaCPP)
#   libtensorrt_llm.so          - TensorRT-LLM core
#   libtensorrt_llm_executor_static.a (or .so)
#   libnvinfer.so.10            - TensorRT inference runtime
#   libnvinfer_plugin.so.10     - TensorRT plugins
#   libcudart.so.12             - CUDA runtime
#   libcublas.so.12             - cuBLAS
#   libcublasLt.so.12           - cuBLAS Lt
#   libnccl.so.2                - NCCL (multi-GPU)
#
# How to populate:
#   1. Build TensorRT-LLM on Linux: cd /path/to/TensorRT-LLM && python3 scripts/build_wheel.py
#   2. Copy .so files from cpp/build/tensorrt_llm/ to this directory
#   3. Or use JavaCPP to generate JNI: mvn -pl trtllm-bridge org.bytedeco:javacpp:build
#
platform=linux-x86_64

