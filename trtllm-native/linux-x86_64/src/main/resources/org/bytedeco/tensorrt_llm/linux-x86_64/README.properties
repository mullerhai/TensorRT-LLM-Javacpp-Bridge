# TensorRT-LLM JNI Native Library — linux-x86_64
#
# This JAR contains JNI C++ source files only (no compiled .so yet).
# libjniTRTLLM.so must be compiled on a real Linux x86_64 + CUDA machine.
#
# IMPORTANT: The pre-existing libjniTRTLLM.so was REMOVED because it was
# compiled for ARM aarch64 (wrong architecture for linux-x86_64).
#
# Steps to build the real native library:
#   On a Linux x86_64 machine with CUDA 12.x and TensorRT 10.x:
#   $ ./compile_jni_linux.sh /path/to/TensorRT-LLM /usr/local/cuda /usr/local/tensorrt
#   Then bundle all deps:
#   $ cd <project-root> && scripts/bundle_native_deps.sh
#
# Or use the all-in-one script:
#   $ TRTLLM_DIR=/workspace/TensorRT-LLM ./scripts/build_linux_native.sh
#
# Expected JAR size after bundling all CUDA/TRT libs: > 100 MB
#
platform=linux-x86_64
